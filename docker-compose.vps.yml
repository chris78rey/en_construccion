services:
  web:
    container_name: datica-web
    build:
      context: .
      dockerfile: Dockerfile
    image: datica-portal-web:astro-1.1.0
    restart: unless-stopped
    expose:
      - '8080'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8080/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s